name: Build

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 6,0

env:
  BBR_REPO: google/bbr
  BBR_BRANCH: v3

jobs:
  keep-schedule:
    uses: WaterLemons2k/scheduled-workflow-activity-action/.github/workflows/reusable.yml@v2

  check:
    runs-on: ubuntu-latest
    env:
      FILE: commit
    outputs:
      commit: ${{ steps.check.outputs.commit }}
      hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Check
        id: check
        run: echo "commit=$(git ls-remote https://github.com/${{ env.BBR_REPO }} ${{ env.BBR_BRANCH }} | cut -f 1)" >> $GITHUB_OUTPUT

      - name: Cache
        id: cache
        uses: actions/cache@v5
        with:
          path: ${{ env.FILE }}
          key: ${{ steps.check.outputs.commit }}

      - name: Save
        if: '!steps.cache.outputs.cache-hit'
        run: echo ${{ steps.check.outputs.commit }} | tee ${{ env.FILE }}

  build:
    needs: check
    if: github.event_name == 'workflow_dispatch' || !needs.check.outputs.hit
    runs-on: ubuntu-latest
    container: debian:bookworm-slim
    steps:
      - name: Checkout BBR
        uses: actions/checkout@v6
        with:
          repository: ${{ env.BBR_REPO }}
          ref: ${{ env.BBR_BRANCH }}
          
      - name: Install essential tools and dependencies
        run: |
          apt-get update
          apt-get install -y curl make build-essential ca-certificates libncurses-dev bison flex libssl-dev libelf-dev dwarves bc rsync cpio git

      - name: Fetch certs and configs
        run: |
          curl -fLO https://github.com/${{ github.repository }}/raw/${{ github.sha }}/{certs/debian-uefi-certs.pem,configs/.config}

          echo "TAG=$(make kernelversion)_$(date -I)" >> "$GITHUB_ENV"

      - name: Install pahole for BTF
        run: apt-get update && apt-get install -y dwarves

      - name: Build
        run: |
          make olddefconfig
          
          scripts/config --disable CONFIG_DEBUG_INFO_NONE
          scripts/config --disable CONFIG_DEBUG_INFO_REDUCED
          scripts/config --disable CONFIG_DEBUG_INFO_SPLIT
          
          scripts/config --enable CONFIG_DEBUG_INFO
          scripts/config --enable CONFIG_DEBUG_INFO_BTF
          scripts/config --enable CONFIG_NET_SCH_INGRESS
          scripts/config --enable CONFIG_NET_CLS_ACT
          
          make olddefconfig

          make -j$(nproc) LOCALVERSION= bindeb-pkg

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          body: Based on google/bbr@${{ needs.check.outputs.commit }}.
          files: ../*.deb
